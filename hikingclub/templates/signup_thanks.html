{% extends "base.html" %}
{% block title %} — Signed Up{% endblock %}
{% block content %}
<div class="note">
  <h2>You're signed up!</h2>
  <p>Thanks for registering for <strong>{{ event.title }}</strong>.</p>
  <p class="muted">{{ event.month }} {{ event.day }} &middot; {{ event.time }} &middot; {{ event.location }}</p>
</div>
<p><a href="/">&larr; Back to events</a></p>
{% endblock %}
