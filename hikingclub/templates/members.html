{% extends "base.html" %}
{% block content %}
<h1>Members</h1>
<table>
  <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th></th></tr>
  {% for m in members %}
  <tr>
    <td>{{ m.id }}</td><td>{{ m.name }}</td><td>{{ m.email }}</td>
    <td>{{ m.role }}</td>
    <td>{{ "BANNED" if m.banned else "active" }}</td>
    <td><a href="/members/{{ m.id }}">view</a></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
